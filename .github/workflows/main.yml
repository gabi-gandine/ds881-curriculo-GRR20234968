name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'cv/**' 
  push:
    branches: [main]
    paths:
      - 'cv/**' 

jobs:
  lint-and-build:
    name: Linter & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Project
        run: npm run build
        
