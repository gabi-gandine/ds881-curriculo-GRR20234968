name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'cv/**' 
  push:
    branches: [main]
    paths:
      - 'cv/**' 

jobs:
  lint-and-build:
    name: Linter & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cv/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./cv

      - name: Run Linter
        run: npm run lint
        working-directory: ./cv

      - name: Build Project
        run: npm run build
        working-directory: ./cv

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: ./cv/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

